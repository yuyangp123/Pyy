name: Sync Nutrition Data from Drive

# 手动触发 + 每日 3AM UTC (11AM Beijing)
on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Target date (YYYY-MM-DD, default: today)"
        required: false
        type: string
  schedule:
    - cron: "0 3 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run nutrition sync script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_DRIVE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: |
          cd hae
          node scripts/sync-nutrition.js

      - name: Configure Git
        run: |
          git config user.name "Claude Bot"
          git config user.email "claude@anthropic.com"

      - name: Push changes (if any)
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add -A
            git commit -m "Auto-refresh nutrition data"
            git push
          fi
